name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Générer l'index des chants
        run: npm run build:index

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Validation des chants
        run: npm run validate
